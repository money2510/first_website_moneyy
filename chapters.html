<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapters | SciencePYQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/chapters.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">⚗️</div>
        <span class="logo-text">SciencePYQ</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="chapters.html" class="nav-link active">Chapters</a>
        <a href="quiz.html" class="nav-link">Quick Quiz</a>
        <a href="leaderboard.html" class="nav-link">Progress</a>
      </div>
      <div class="nav-actions">
        <button class="btn-theme-toggle" id="themeToggle">🌙</button>
      </div>
      <button class="nav-hamburger" id="navHamburger"><span></span><span></span><span></span></button>
    </div>
    <div class="nav-mobile-menu" id="navMobileMenu">
      <a href="index.html" class="nav-link">Home</a>
      <a href="chapters.html" class="nav-link active">Chapters</a>
      <a href="quiz.html" class="nav-link">Quick Quiz</a>
      <a href="leaderboard.html" class="nav-link">Progress</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>All Chapters</h1>
    <p>NCERT Class 10 Science Syllabus</p>
  </header>

  <div class="filter-bar">
    <div class="filter-bar-inner">
      <div class="filter-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="chapterSearch" placeholder="Search chapters, topics..." />
      </div>
      <div class="filter-pills" id="unitFilters">
        <button class="filter-pill active" data-unit="all">All Units</button>
        <button class="filter-pill" data-unit="Chemistry">Chemistry</button>
        <button class="filter-pill" data-unit="Physics">Physics</button>
        <button class="filter-pill" data-unit="Biology">Biology</button>
      </div>
    </div>
  </div>

  <main class="chapters-main">
    <div class="chapters-full-grid" id="chaptersGrid">
      <!-- Populated by JS -->
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/chapters.js"></script>
</body>
</html>
